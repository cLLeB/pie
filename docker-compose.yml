# PIE on-prem / self-host stack. Runs fully offline (no internet at runtime).
# `pie-server` signs certificates and ingests events; point PIE_BIOMETRIC_URL at
# your existing contactless face/palm verification service for the identity layer.
services:
  pie-server:
    build: ./services/server
    ports:
      - "8000:8000"
    environment:
      # JSON map of tenant -> HMAC secret. Override in production.
      PIE_TENANT_SECRETS: '{"demo":"pie-demo-tenant-secret"}'
      # Browser app origins allowed to call the API.
      PIE_CORS_ORIGINS: "http://localhost:5173,http://localhost:5174"
      # Durable SQLite store (single file) on the mounted volume.
      PIE_DB_PATH: "/data/pie.db"
      # Identity backend (the existing biometric /v1 service); optional.
      # PIE_BIOMETRIC_URL: "http://biometric:7860"
      # PIE_BIOMETRIC_KEY: "fk_your_key"
    volumes:
      - pie-data:/data
    restart: unless-stopped

volumes:
  pie-data:
